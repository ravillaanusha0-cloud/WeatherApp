<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky:    #0f172a;
      --card:   #1e293b;
      --accent: #38bdf8;
      --soft:   #7dd3fc;
      --muted:  #94a3b8;
      --text:   #f1f5f9;
      --err:    #f87171;
    }

    body {
      min-height: 100vh;
      background: var(--sky);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      padding: 24px;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .tagline {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 32px;
      text-align: center;
    }

    .search-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 460px;
      margin-bottom: 28px;
    }

    input {
      flex: 1;
      padding: 13px 18px;
      border-radius: 12px;
      border: 1.5px solid #334155;
      background: var(--card);
      color: var(--text);
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    button {
      padding: 13px 22px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #0f172a;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover  { background: var(--soft); }
    button:active { transform: scale(0.97); }

    #error {
      color: var(--err);
      font-size: 0.88rem;
      margin-bottom: 16px;
      min-height: 20px;
      text-align: center;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 32px 28px;
      width: 100%;
      max-width: 460px;
      display: none;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      animation: fadeUp 0.35s ease;
    }
    .card.visible { display: flex; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .city-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .city-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.1;
    }
    .country { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    .weather-icon { font-size: 3rem; line-height: 1; }

    .temp-row {
      display: flex;
      align-items: baseline;
      gap: 14px;
    }
    .temp {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 3.4rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .feels {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .desc {
      font-size: 1rem;
      color: var(--soft);
      text-transform: capitalize;
      font-weight: 300;
    }

    .divider {
      height: 1px;
      background: #334155;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .stat {
      background: #0f172a;
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
    }
    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
    }

    .loader {
      display: none;
      width: 24px; height: 24px;
      border: 3px solid #334155;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    .loader.active { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 400px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .temp  { font-size: 2.6rem; }
    }
  </style>
</head>
<body>

  <h1>⛅ Weather Now</h1>
  <p class="tagline">Real-time weather for any city in the world</p>

  <div class="search-row">
    <input id="cityInput" type="text" placeholder="Enter city name…" />
    <button onclick="getWeather()">Search</button>
  </div>

  <div class="loader" id="loader"></div>
  <div id="error"></div>

  <div class="card" id="weatherCard">
    <div class="city-row">
      <div>
        <div class="city-name" id="cityName"></div>
        <div class="country" id="countryName"></div>
      </div>
      <div class="weather-icon" id="weatherIcon"></div>
    </div>

    <div class="temp-row">
      <div class="temp" id="temperature"></div>
      <div class="feels" id="feelsLike"></div>
    </div>

    <div class="desc" id="description"></div>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="humidity"></div>
      </div>
      <div class="stat">
        <div class="stat-label">Wind</div>
        <div class="stat-value" id="wind"></div>
      </div>
      <div class="stat">
        <div class="stat-label">Visibility</div>
        <div class="stat-value" id="visibility"></div>
      </div>
    </div>
  </div>

  <script>
    // 🔑 PASTE YOUR OPENWEATHERMAP API KEY BELOW
    const API_KEY = "YOUR_API_KEY_HERE";

    const iconMap = {
      "01": "☀️", "02": "⛅", "03": "☁️", "04": "☁️",
      "09": "🌧️", "10": "🌦️", "11": "⛈️", "13": "❄️", "50": "🌫️"
    };

    document.getElementById("cityInput")
      .addEventListener("keydown", e => { if (e.key === "Enter") getWeather(); });

    async function getWeather() {
      const city = document.getElementById("cityInput").value.trim();
      const errorEl = document.getElementById("error");
      const card    = document.getElementById("weatherCard");
      const loader  = document.getElementById("loader");

      errorEl.textContent = "";
      card.classList.remove("visible");

      if (!city) { errorEl.textContent = "Please enter a city name."; return; }

      loader.classList.add("active");

      try {
        const res = await fetch(
          `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`
        );

        if (res.status === 401) throw new Error("Invalid API key. Please check your key.");
        if (res.status === 404) throw new Error(`City "${city}" not found. Try another name.`);
        if (!res.ok)            throw new Error("Something went wrong. Please try again.");

        const data = await res.json();
        displayWeather(data);

      } catch (err) {
        errorEl.textContent = err.message;
      } finally {
        loader.classList.remove("active");
      }
    }

    function displayWeather(data) {
      const iconCode = data.weather[0].icon.slice(0, 2);
      const emoji    = iconMap[iconCode] || "🌡️";

      document.getElementById("cityName").textContent    = data.name;
      document.getElementById("countryName").textContent = data.sys.country;
      document.getElementById("weatherIcon").textContent = emoji;
      document.getElementById("temperature").textContent = `${Math.round(data.main.temp)}°C`;
      document.getElementById("feelsLike").textContent   = `Feels like ${Math.round(data.main.feels_like)}°C`;
      document.getElementById("description").textContent = data.weather[0].description;
      document.getElementById("humidity").textContent    = `${data.main.humidity}%`;
      document.getElementById("wind").textContent        = `${Math.round(data.wind.speed)} m/s`;
      document.getElementById("visibility").textContent  =
        data.visibility >= 1000
          ? `${(data.visibility / 1000).toFixed(1)} km`
          : `${data.visibility} m`;

      document.getElementById("weatherCard").classList.add("visible");
    }
  </script>

</body>
</html>
